<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Compass — Find the direction</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      background: #fff; color: #111;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation; overflow-x: hidden;
    }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
    .page { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 420px; text-align: center; }
    .page.active { display: flex; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .sub { font-size: 0.9rem; color: #666; margin-bottom: 1.5rem; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 56px; min-width: 200px; padding: 1rem 2rem;
      font-size: 1.25rem; font-weight: 600; color: #fff;
      background: #111; border: none; border-radius: 12px; cursor: pointer;
    }
    .btn-secondary { margin-top: 1rem; background: #333; font-size: 1rem; }
    .heading-display { font-size: 2.5rem; font-weight: 700; margin: 1rem 0; }
    .status { font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
    .btn-row { margin-top: 1rem; display: flex; gap: 10px; }
  </style>
</head>
<body>

  <section id="page-setup" class="page active">
    <h1>Compass Setup</h1>
    <p class="sub">Enable sensors and lock a direction.</p>
    <button id="btn-enable-sensors" class="btn">Enable Sensors</button>
    <p id="setup-heading" class="heading-display">— °</p>
    <button id="btn-lock" class="btn btn-secondary" style="display:none;">Lock Direction</button>
    <button id="btn-next" class="btn btn-secondary" style="display:none;">Next</button>
    <p id="setup-status" class="status">Waiting for sensors...</p>
    <div id="test-setup" style="display:none; margin-top:1rem; padding:0.75rem; background:#f0f0f0; border-radius:8px; font-size:0.85rem; width:100%; max-width:280px;">
      <strong>Test mode</strong> — simulate heading (no compass):
      <input type="range" id="slider-setup" min="0" max="360" value="0" style="display:block; width:100%; margin:0.25rem 0;">
      <span id="value-setup">0</span>°
    </div>
  </section>

  <section id="page-player" class="page">
    <h1 id="player-title">Find the Direction</h1>
    <p id="player-sub" class="sub">Volume = proximity. Wind &lt; 30°, Birds &lt; 5°.</p>
    <div id="player-ui">
        <p id="player-heading" class="heading-display">— °</p>
        <p id="player-diff" class="status">— ° off</p>
    </div>
    <button id="btn-start" class="btn">Start Game</button>
    <div id="test-player" style="display:none; margin-top:1rem; padding:0.75rem; background:#f0f0f0; border-radius:8px; font-size:0.85rem; width:100%; max-width:280px;">
      <strong>Test mode</strong> — drag to simulate heading (0° off = loud, 180° off = silent):
      <input type="range" id="slider-player" min="0" max="360" value="0" style="display:block; width:100%; margin:0.25rem 0;">
      <span id="value-player">0</span>°
    </div>
    <div class="btn-row">
        <button id="btn-hide" class="btn btn-secondary">Hide UI</button>
        <button id="btn-restart" class="btn btn-secondary">Restart</button>
    </div>
  </section>

<script>
(function () {
  'use strict';

  var AUDIO_SOURCES = {
    river: 'https://raw.githubusercontent.com/remvze/moodist/main/public/sounds/nature/river.mp3',
    birds: 'https://raw.githubusercontent.com/remvze/moodist/main/public/sounds/animals/birds.mp3',
    wind: 'https://raw.githubusercontent.com/remvze/moodist/main/public/sounds/nature/wind.mp3'
  };

  var targetHeading = null;
  var filteredHeading = null;
  var EMA_ALPHA = 0.15;
  var gameStarted = false;
  var uiVisible = true;
  var testMode = /[?&]test=1/.test(location.search);

  // Web Audio 变量
  var audioCtx = null;
  var tracks = { river: null, birds: null, wind: null };

  // --- 初始化音频系统 (关键：必须由用户点击触发) ---
  function initAudioContext() {
    if (audioCtx) return;
    var AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();

    // 批量初始化音轨
    for (var key in AUDIO_SOURCES) {
        var audio = new Audio(AUDIO_SOURCES[key]);
        audio.crossOrigin = "anonymous";
        audio.loop = true;
        
        var source = audioCtx.createMediaElementSource(audio);
        var gainNode = audioCtx.createGain();
        gainNode.gain.value = 0; // 初始静音

        source.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        tracks[key] = { el: audio, gain: gainNode };
    }
  }

  // --- 音量控制 (解决 iOS 不支持 .volume 的问题) ---
  function updateVolumes() {
    if (!audioCtx || !gameStarted) return;
    if (filteredHeading == null || targetHeading == null) return;

    var diff = Math.abs(shortestAngleDiff(filteredHeading, targetHeading));
    if (isNaN(diff)) return;
    
    // 1. River: 180° = 0, 0° = 1
    var vRiver = Math.pow(Math.max(0, 1 - diff / 180), 1.5);
    setGain(tracks.river.gain, vRiver);

    // 2. Wind: 30°–0° (0° = max, 30° = min)
    var vWind = diff <= 30 ? (1 - diff / 30) : 0;
    setGain(tracks.wind.gain, vWind);

    // 3. Birds: 5°–0° (0° = max, 5° = min，定位最准时)
    var vBirds = diff <= 5 ? (1 - diff / 5) : 0;
    setGain(tracks.birds.gain, vBirds);

    // 更新 UI
    document.getElementById('player-heading').textContent = Math.round(filteredHeading) + '°';
    document.getElementById('player-diff').textContent = Math.round(diff) + '° off';
  }

  function setGain(gainNode, value) {
    // setTargetAtTime 是 iOS 上最顺滑且不会崩溃的音量控制方式
    gainNode.gain.setTargetAtTime(value, audioCtx.currentTime, 0.05);
  }

  // --- 传感器逻辑 ---
  function shortestAngleDiff(from, to) {
    var d = (to - from + 360) % 360;
    return d > 180 ? d - 360 : d;
  }

  function onOrientation(ev) {
    if (testMode) return;
    var raw = (typeof ev.webkitCompassHeading === 'number' && !isNaN(ev.webkitCompassHeading))
      ? ev.webkitCompassHeading
      : (typeof ev.alpha === 'number' && !isNaN(ev.alpha) ? (360 - ev.alpha) : null);
    if (raw == null || isNaN(raw)) return;
    raw = ((raw % 360) + 360) % 360;
    if (filteredHeading === null) filteredHeading = raw;
    else {
      var d = shortestAngleDiff(filteredHeading, raw);
      filteredHeading = (filteredHeading + d * EMA_ALPHA + 360) % 360;
    }

    if (document.getElementById('page-setup').classList.contains('active')) {
      document.getElementById('setup-heading').textContent = Math.round(filteredHeading) + '°';
    }
    if (gameStarted) updateVolumes();
  }

  // --- 按钮事件 ---
  if (testMode) {
    document.getElementById('test-setup').style.display = 'block';
    document.getElementById('test-player').style.display = 'block';
    document.getElementById('slider-setup').addEventListener('input', function() {
      var v = Number(this.value);
      filteredHeading = v;
      document.getElementById('value-setup').textContent = v;
      document.getElementById('setup-heading').textContent = v + '°';
    });
    document.getElementById('slider-player').addEventListener('input', function() {
      var v = Number(this.value);
      filteredHeading = v;
      document.getElementById('value-player').textContent = v;
      if (gameStarted) updateVolumes();
    });
  }

  document.getElementById('btn-enable-sensors').addEventListener('click', function() {
    initAudioContext(); // 用户点击瞬间解锁 Web Audio
    
    if (testMode) {
      filteredHeading = Number(document.getElementById('slider-setup').value);
      document.getElementById('setup-heading').textContent = filteredHeading + '°';
      document.getElementById('value-setup').textContent = filteredHeading;
      document.getElementById('setup-status').textContent = 'Test mode: move slider, then Lock Direction.';
    } else if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(function(res) {
        if (res === 'granted') window.addEventListener('deviceorientation', onOrientation);
      });
      document.getElementById('setup-status').textContent = 'Sensors active. Rotate and lock.';
    } else {
      window.addEventListener('deviceorientation', onOrientation);
      document.getElementById('setup-status').textContent = 'Sensors active. Rotate and lock.';
    }
    
    this.style.display = 'none';
    document.getElementById('btn-lock').style.display = 'inline-flex';
    document.getElementById('btn-next').style.display = 'inline-flex';
  });

  document.getElementById('btn-lock').addEventListener('click', function() {
    if (filteredHeading == null) return;
    targetHeading = Math.round(filteredHeading);
    document.getElementById('setup-status').textContent = 'Target Locked: ' + targetHeading + '°';
  });

  document.getElementById('btn-next').addEventListener('click', function() {
    if (targetHeading == null) {
      document.getElementById('setup-status').textContent = 'Please lock a direction first.';
      return;
    }
    document.getElementById('page-setup').classList.remove('active');
    document.getElementById('page-player').classList.add('active');
  });

  document.getElementById('btn-start').addEventListener('click', function() {
    if (!audioCtx || targetHeading == null) return;
    gameStarted = true;
    if (testMode) {
      filteredHeading = Number(document.getElementById('slider-player').value);
      document.getElementById('slider-player').value = filteredHeading;
      document.getElementById('value-player').textContent = filteredHeading;
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    // 同时启动所有音轨
    for (var key in tracks) { tracks[key].el.play(); }
    
    this.style.display = 'none';
    updateVolumes();
  });

  document.getElementById('btn-hide').addEventListener('click', function() {
    uiVisible = !uiVisible;
    document.getElementById('player-ui').style.opacity = uiVisible ? '1' : '0';
    this.textContent = uiVisible ? 'Hide UI' : 'Show UI';
  });

  document.getElementById('btn-restart').addEventListener('click', function() {
    window.location.reload();
  });

})();
</script>
</body>
</html>
