<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Compass — Find the direction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      background: #fff; color: #111;
      font-family: 'Noto Sans', sans-serif; font-weight: 400;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation; overflow-x: hidden;
    }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
    .page { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 420px; text-align: center; }
    .page.active { display: flex; }
    h1 { font-family: 'Noto Sans', sans-serif; font-weight: 700; font-size: 1.5rem; margin-bottom: 0.5rem; }
    .sub { font-family: 'Noto Sans', sans-serif; font-weight: 300; font-size: 0.9rem; color: #666; margin-bottom: 1.5rem; }
    .btn {
      font-family: 'Noto Sans', sans-serif; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 56px; min-width: 200px; padding: 1rem 2rem;
      font-size: 1.25rem; color: #fff;
      background: #111; border: none; border-radius: 12px; cursor: pointer;
    }
    .btn-secondary { margin-top: 1rem; background: #333; font-size: 1rem; }
    .heading-display { font-family: 'Noto Sans', sans-serif; font-weight: 700; font-size: 2.5rem; margin: 1rem 0; }
    .status { font-family: 'Noto Sans', sans-serif; font-weight: 300; font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
    /* Player page: left-aligned layout */
    #page-player.page.active { flex-direction: column; align-items: stretch; text-align: left; min-height: 100vh; padding-top: calc(env(safe-area-inset-top, 0px) + 2.5rem); padding-bottom: 30px; padding-left: 0; }
    #page-player .page-player-top { width: 100%; text-align: left; margin-bottom: 0.5rem; padding-left: 0; }
    #page-player .page-player-top h1 { margin-left: 0; padding-left: 0; }
    #page-player .page-player-center { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; text-align: left; width: 100%; }
    #page-player .long-press-hint { font-family: 'Noto Sans', sans-serif; font-weight: 300; font-size: 1.15rem; color: #111; margin-top: 1rem; }
    #page-player .player-diff-only { font-family: 'Noto Sans', sans-serif; font-weight: 700; font-size: 2rem; margin: 0; color: #111; }
    /* 1. 确保按钮容器完全靠左，没有内边距干扰 */
  #page-player .btn-row {
    margin-top: auto;
    padding-top: 1.5rem;
    padding-bottom: 1rem; /* 留出安全区域 */
    padding-left: 0;      /* 确保容器本身不缩进 */
    display: flex;
    flex-direction: column;
    gap: 10px;            /* 按钮之间的间距 */
    align-items: flex-start;
  }

  /* 2. 移除按钮左侧的 padding，使文字对齐边界 */
  #page-player .btn-row .btn {
    color: #111;
    background: transparent;
    font-size: 1.15rem;
    min-width: auto;
    min-height: auto;     /* 移除最小高度限制，让它更像纯文字链接 */
    padding: 5px 0;       /* 上下留 5px 手感，左侧设为 0 以对齐 */
    text-align: left;
    border-radius: 0;     /* 纯文字模式不需要圆角 */
    justify-content: flex-start; /* 内部内容左对齐 */
  }
</style>
</head>
<body>

  <section id="page-setup" class="page active">
    <h1>Compass Setup</h1>
    <p class="sub">Enable sensors and lock a direction.</p>
    <button id="btn-enable-sensors" class="btn">Enable Sensors</button>
    <p id="setup-heading" class="heading-display">— °</p>
    <button id="btn-lock" class="btn btn-secondary" style="display:none;">Lock Direction</button>
    <button id="btn-next" class="btn btn-secondary" style="display:none;">Next</button>
    <p id="setup-status" class="status">Waiting for sensors...</p>
  </section>

  <section id="page-player" class="page">
    <div class="page-player-top">
      <h1 id="player-title">Find the Direction</h1>
      <p id="player-sub" class="sub">Volume = proximity. Wind &lt; 30°, Birds &lt; 5°.</p>
    </div>
    <div class="page-player-center">
      <p id="player-diff" class="player-diff-only" style="display:none;">— ° off</p>
      <p class="long-press-hint">Lift Phone to Start. Put Down to Stop.</p>
    </div>
    <div class="btn-row">
      <button id="btn-show-direction" class="btn btn-secondary">Show Direction</button>
      <button id="btn-restart" class="btn btn-secondary">Restart</button>
    </div>
  </section>

  <div id="debug-panel" style="display:none; position: fixed; left: 12px; right: 12px; bottom: 12px; max-height: 40vh; overflow: auto; z-index: 9999; background: rgba(255,255,255,0.92); border: 1px solid #ddd; border-radius: 10px; padding: 10px; font-size: 12px; line-height: 1.35; color: #111;">
    <div style="font-weight:700; margin-bottom:6px;">Debug</div>
    <pre id="debug-text" style="margin:0; white-space:pre-wrap; word-break:break-word;"></pre>
  </div>

<script>
(function () {
  'use strict';

  var targetHeading = null;
  var filteredHeading = null;
  var EMA_ALPHA = 0.15;
  var gameStarted = false;
  var directionVisible = false;
  var tiltListening = false; // 仅在已锁定方向并进入 Page 2 后启用 beta 倾斜监听
  var HAPTIC_WAKE_MS = 120;   // 竖起：短震一次
  var HAPTIC_SLEEP_PATTERN = [120, 90, 120]; // 放下：两下震动
  var debugMode = /[?&]debug=1/.test(location.search);
  var debug = {
    enabled: debugMode,
    permission: 'unknown',
    listenersAttached: false,
    events: { deviceorientation: 0, deviceorientationabsolute: 0 },
    last: { type: '', alpha: null, beta: null, gamma: null, webkitCompassHeading: null, absolute: null, ts: 0 }
  };
  // Web Audio 变量（合成音效：440Hz 脉冲水滴 + 极微弱粉红噪音）
  var audioCtx = null;
  var noiseSource = null;
  var noiseGain = null;

  var SINE_FREQ = 440;
  var PULSE_DECAY_SEC = 0.1;
  var PULSE_START_GAIN = 0.2;
  var PULSE_END_GAIN = 0.0001; // 需要 > 0，供 exponentialRamp 用

  var PULSE_MIN_INTERVAL_SEC = 0.08; // 对准目标：滴滴滴
  var PULSE_MAX_INTERVAL_SEC = 1.0;  // 偏离目标：滴......滴......
  var pulseIntervalSec = PULSE_MAX_INTERVAL_SEC;

  var PINK_NOISE_BASE_GAIN = 0.00002;
  var PINK_NOISE_SCALE_GAIN = 0.00012; // 随 diff 略增大（仍保持极弱）

  var pulseTimer = null;

  function createPinkNoiseBuffer(ctx, durationSec) {
    var bufferSize = Math.max(1, Math.floor(ctx.sampleRate * durationSec));
    var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    var output = buffer.getChannelData(0);

    var b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
    for (var i = 0; i < bufferSize; i++) {
      var white = Math.random() * 2 - 1;
      b0 = 0.99886 * b0 + white * 0.0555179;
      b1 = 0.99332 * b1 + white * 0.0750759;
      b2 = 0.96900 * b2 + white * 0.1538520;
      b3 = 0.86650 * b3 + white * 0.3104856;
      b4 = 0.55000 * b4 + white * 0.5329522;
      b5 = -0.7616 * b5 - white * 0.0168980;

      var pink = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
      b6 = white * 0.115926;
      output[i] = pink * 0.11;
    }
    return buffer;
  }

  function initAudioContext() {
    if (audioCtx) return;
    var AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();

    noiseGain = audioCtx.createGain();
    noiseGain.gain.value = 0;
    noiseGain.connect(audioCtx.destination);

    noiseSource = audioCtx.createBufferSource();
    noiseSource.buffer = createPinkNoiseBuffer(audioCtx, 2.0);
    noiseSource.loop = true;
    noiseSource.connect(noiseGain);
    try { noiseSource.start(); } catch (e) {}
  }

  // 页面点击后的“解锁”入口：resume + 轻微打开底噪（避免后续手势外无法响）
  function unlockAudioForBeta() {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (noiseGain) {
      noiseGain.gain.setTargetAtTime(PINK_NOISE_BASE_GAIN, audioCtx.currentTime, 0.05);
    }
  }

  function playPulse(time) {
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(SINE_FREQ, time);

    var g = audioCtx.createGain();
    g.gain.setValueAtTime(PULSE_START_GAIN, time);
    g.gain.exponentialRampToValueAtTime(Math.max(PULSE_END_GAIN, 0.00001), time + PULSE_DECAY_SEC);

    osc.connect(g);
    g.connect(audioCtx.destination);

    osc.start(time);
    osc.stop(time + PULSE_DECAY_SEC + 0.03);
  }

  function startPulseLoop() {
    if (!audioCtx) return;
    if (pulseTimer) clearTimeout(pulseTimer);

    function tick() {
      if (!gameStarted) return;
      var t = audioCtx.currentTime + 0.015;
      playPulse(t);
      var delayMs = Math.max(0, pulseIntervalSec * 1000);
      pulseTimer = setTimeout(tick, delayMs);
    }

    pulseTimer = setTimeout(tick, 10);
  }

  function stopPulseLoop() {
    if (pulseTimer) {
      clearTimeout(pulseTimer);
      pulseTimer = null;
    }
    if (noiseGain) noiseGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
  }

  function updatePlayerUI() {
    if (!audioCtx || !gameStarted) return;
    if (filteredHeading == null || targetHeading == null) return;

    var diff = Math.abs(shortestAngleDiff(filteredHeading, targetHeading));
    if (isNaN(diff)) return;

    // 更新 UI（仅 ° off，默认不展示由 Show Direction 控制）
    var diffEl = document.getElementById('player-diff');
    diffEl.textContent = Math.round(diff) + '° off';
    if (directionVisible) diffEl.style.display = '';

    // Tempo Mapping：根据 diff 映射脉冲间隔
    var dev = Math.min(1, Math.max(0, diff / 180)); // 0..1
    pulseIntervalSec = PULSE_MIN_INTERVAL_SEC + dev * (PULSE_MAX_INTERVAL_SEC - PULSE_MIN_INTERVAL_SEC);

    // Pink Noise 底噪补偿：偏离越大，噪音略增大
    if (noiseGain) {
      var noiseLevel = PINK_NOISE_BASE_GAIN + dev * PINK_NOISE_SCALE_GAIN;
      noiseGain.gain.setTargetAtTime(noiseLevel, audioCtx.currentTime, 0.05);
    }
  }

  // 兼容旧调用点：onOrientation 仍调用 updateVolumes
  function updateVolumes() {
    updatePlayerUI();
  }

  // --- 传感器逻辑 ---
  function shortestAngleDiff(from, to) {
    var d = (to - from + 360) % 360;
    return d > 180 ? d - 360 : d;
  }

  function setDebugText() {
    if (!debug.enabled) return;
    var el = document.getElementById('debug-text');
    if (!el) return;
    var lines = [];
    lines.push('url: ' + location.href);
    lines.push('secureContext: ' + (window.isSecureContext ? 'true' : 'false'));
    lines.push('protocol: ' + location.protocol);
    lines.push('permission: ' + debug.permission);
    lines.push('listenersAttached: ' + (debug.listenersAttached ? 'true' : 'false'));
    lines.push('events: deviceorientation=' + debug.events.deviceorientation + ', deviceorientationabsolute=' + debug.events.deviceorientationabsolute);
    lines.push('last.type: ' + debug.last.type);
    lines.push('last.absolute: ' + debug.last.absolute);
    lines.push('last.webkitCompassHeading: ' + debug.last.webkitCompassHeading);
    lines.push('last.alpha: ' + debug.last.alpha);
    lines.push('last.beta: ' + debug.last.beta);
    lines.push('last.gamma: ' + debug.last.gamma);
    lines.push('last.ts: ' + (debug.last.ts ? new Date(debug.last.ts).toISOString() : ''));
    el.textContent = lines.join('\n');
  }

  function onOrientation(ev) {
    if (debug.enabled) {
      debug.last.type = ev && ev.type ? ev.type : '';
      if (debug.last.type === 'deviceorientation') debug.events.deviceorientation += 1;
      if (debug.last.type === 'deviceorientationabsolute') debug.events.deviceorientationabsolute += 1;
      debug.last.alpha = (ev && ev.alpha != null) ? ev.alpha : null;
      debug.last.beta = (ev && ev.beta != null) ? ev.beta : null;
      debug.last.gamma = (ev && ev.gamma != null) ? ev.gamma : null;
      debug.last.webkitCompassHeading = (ev && ev.webkitCompassHeading != null) ? ev.webkitCompassHeading : null;
      debug.last.absolute = (ev && ev.absolute != null) ? ev.absolute : null;
      debug.last.ts = Date.now();
      setDebugText();
    }

    // beta: 倾斜角（Lift-to-Wake 触发器）
    // Active: Math.abs(beta) 在 75° 到 105°之间
    // Standby: beta < 30° 停止游戏（不 restart）
    if (tiltListening && document.getElementById('page-player').classList.contains('active')) {
      var beta = ev && ev.beta != null ? Number(ev.beta) : NaN;
      if (!isNaN(beta)) {
        var upright = Math.abs(beta) >= 75 && Math.abs(beta) <= 105;
        if (upright && !gameStarted) {
          if (navigator.vibrate) navigator.vibrate(HAPTIC_WAKE_MS);
          doStartGame();
        } else if (!upright && beta < 30 && gameStarted) {
          if (navigator.vibrate) navigator.vibrate(HAPTIC_SLEEP_PATTERN);
          doEndGame();
        } else if (upright && gameStarted) {
          // 已在播放则什么也不做
        }
      }
    }

    // 计算“方位角”：优先 webkitCompassHeading，其次用 alpha 做近似（带屏幕旋转补偿）
    // iOS 上 alpha/beta 可能是 null/string，所以这里做容错：取不到就按 0 计算，避免 UI 永远停在 “— °”
    var rawHeading = null;
    if (typeof ev.webkitCompassHeading === 'number' && !isNaN(ev.webkitCompassHeading)) {
      rawHeading = ev.webkitCompassHeading;
    } else {
      var alphaVal = (typeof ev.alpha === 'number' ? ev.alpha : Number(ev.alpha));
      if (isNaN(alphaVal)) alphaVal = 0;

      var screenAngle = 0;
      try {
        if (screen && screen.orientation && typeof screen.orientation.angle === 'number') {
          screenAngle = screen.orientation.angle;
        } else if (typeof window.orientation === 'number') {
          screenAngle = window.orientation;
        }
      } catch (e) {}
      rawHeading = (360 - alphaVal + screenAngle + 360) % 360;
    }

    if (filteredHeading === null) filteredHeading = rawHeading;
    else {
      var d = shortestAngleDiff(filteredHeading, rawHeading);
      filteredHeading = (filteredHeading + d * EMA_ALPHA + 360) % 360;
    }

    if (document.getElementById('page-setup').classList.contains('active')) {
      document.getElementById('setup-heading').textContent = Math.round(filteredHeading) + '°';
    }
    if (gameStarted) updateVolumes();
  }

  // --- 按钮事件 ---
  document.getElementById('btn-enable-sensors').addEventListener('click', function() {
    var enableBtn = this;
    initAudioContext(); // 用户点击瞬间解锁 Web Audio
    unlockAudioForBeta(); // 预加载并 play 静音音频，保证后续 beta 触发能正常出声

    if (debug.enabled) {
      document.getElementById('debug-panel').style.display = 'block';
      setDebugText();
    }

    function onSensorsReady() {
      enableBtn.style.display = 'none';
      document.getElementById('btn-lock').style.display = 'inline-flex';
      document.getElementById('btn-next').style.display = 'inline-flex';
      document.getElementById('setup-status').textContent = 'Sensors active. Rotate and lock. Then lift to start.';
    }

    // iOS 要求安全上下文(HTTPS) 才会弹出 motion/orientation 授权框
    if (!window.isSecureContext) {
      debug.permission = 'blocked_in_insecure_context';
      if (debug.enabled) setDebugText();
      document.getElementById('setup-status').textContent =
        'Motion & Orientation requires HTTPS on iOS (secureContext=false). Please test on https://www.yujingshistudio.com/compass or use an HTTPS dev tunnel.';
      return;
    }
    
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(function(res) {
        debug.permission = res;
        if (debug.enabled) setDebugText();
        if (res === 'granted') {
          window.addEventListener('deviceorientation', onOrientation);
          window.addEventListener('deviceorientationabsolute', onOrientation);
          debug.listenersAttached = true;
          if (debug.enabled) setDebugText();
          onSensorsReady();
        } else {
          document.getElementById('setup-status').textContent =
            'Permission not granted. secureContext=' + (window.isSecureContext ? 'true' : 'false') +
            '. On iOS Safari you must allow Motion & Orientation for this site (and ensure you are using Safari, not an in-app browser).';
        }
      }).catch(function(err) {
        debug.permission = 'error: ' + (err && err.message ? err.message : String(err));
        if (debug.enabled) setDebugText();
        document.getElementById('setup-status').textContent = 'Permission request failed.';
      });
    } else {
      window.addEventListener('deviceorientation', onOrientation);
      window.addEventListener('deviceorientationabsolute', onOrientation);
      debug.permission = 'not_required';
      debug.listenersAttached = true;
      if (debug.enabled) setDebugText();
      onSensorsReady();
    }
  });

  document.getElementById('btn-lock').addEventListener('click', function() {
    targetHeading = Math.round(filteredHeading);
    document.getElementById('setup-status').textContent = 'Target Locked: ' + targetHeading + '°';
  });

  document.getElementById('btn-next').addEventListener('click', function() {
    document.getElementById('page-setup').classList.remove('active');
    document.getElementById('page-player').classList.add('active');
    tiltListening = targetHeading != null; // 仅在已锁定方向后启用倾斜监听
  });

  function doStartGame() {
    if (!audioCtx || targetHeading == null) return;
    gameStarted = true;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    // 启动合成“水滴脉冲”+粉红底噪
    if (noiseGain) noiseGain.gain.setTargetAtTime(PINK_NOISE_BASE_GAIN, audioCtx.currentTime, 0.05);
    updatePlayerUI();
    startPulseLoop();
  }

  function doEndGame() {
    gameStarted = false;
    stopPulseLoop();
  }

  document.getElementById('btn-show-direction').addEventListener('click', function() {
    directionVisible = !directionVisible;
    document.getElementById('player-diff').style.display = directionVisible ? '' : 'none';
    this.textContent = directionVisible ? 'Hide Direction' : 'Show Direction';
  });

  document.getElementById('btn-restart').addEventListener('click', function() {
    window.location.reload();
  });

})();
</script>
</body>
</html>
