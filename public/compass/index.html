<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Compass — Find the direction</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      background: #fff; color: #111;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation; overflow-x: hidden;
    }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
    .page { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 420px; text-align: center; }
    .page.active { display: flex; }
    #page-player.page.active { flex-direction: column; min-height: 70vh; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .sub { font-size: 0.9rem; color: #666; margin-bottom: 1.5rem; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 56px; min-width: 200px; padding: 1rem 2rem;
      font-size: 1.25rem; font-weight: 600; color: #fff;
      background: #111; border: none; border-radius: 12px; cursor: pointer;
    }
    .btn-secondary { margin-top: 1rem; background: #333; font-size: 1rem; }
    .heading-display { font-size: 2.5rem; font-weight: 700; margin: 1rem 0; }
    .status { font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
    .btn-row { margin-top: auto; padding-top: 1.5rem; display: flex; gap: 10px; }
    .page-player-top { margin-bottom: 0.5rem; }
    .page-player-center { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .long-press-hint { font-size: 1.15rem; color: #111; margin-top: 1rem; }
    .player-diff-only { font-size: 2rem; font-weight: 700; margin: 0; color: #111; }
  </style>
</head>
<body>

  <section id="page-setup" class="page active">
    <h1>Compass Setup</h1>
    <p class="sub">Enable sensors and lock a direction.</p>
    <button id="btn-enable-sensors" class="btn">Enable Sensors</button>
    <p id="setup-heading" class="heading-display">— °</p>
    <button id="btn-lock" class="btn btn-secondary" style="display:none;">Lock Direction</button>
    <button id="btn-next" class="btn btn-secondary" style="display:none;">Next</button>
    <p id="setup-status" class="status">Waiting for sensors...</p>
  </section>

  <section id="page-player" class="page">
    <div class="page-player-top">
      <h1 id="player-title">Find the Direction</h1>
      <p id="player-sub" class="sub">Volume = proximity. Wind &lt; 30°, Birds &lt; 5°.</p>
    </div>
    <div class="page-player-center">
      <p id="player-diff" class="player-diff-only" style="display:none;">— ° off</p>
      <p class="long-press-hint">Long Press Anywhere for 2secs to Start or End.</p>
    </div>
    <div class="btn-row">
      <button id="btn-show-direction" class="btn btn-secondary">Show Direction</button>
      <button id="btn-restart" class="btn btn-secondary">Restart</button>
    </div>
  </section>

<script>
(function () {
  'use strict';

  var AUDIO_SOURCES = {
    river: 'https://raw.githubusercontent.com/remvze/moodist/main/public/sounds/nature/river.mp3',
    birds: 'https://raw.githubusercontent.com/remvze/moodist/main/public/sounds/animals/birds.mp3',
    wind: 'https://raw.githubusercontent.com/remvze/moodist/main/public/sounds/nature/wind.mp3'
  };

  var targetHeading = null;
  var filteredHeading = null;
  var EMA_ALPHA = 0.15;
  var gameStarted = false;
  var directionVisible = false;
  var longPressTimer = null;
  var LONG_PRESS_MS = 2000;
  var VIBRATE_MS = 1000;

  // Web Audio 变量
  var audioCtx = null;
  var tracks = { river: null, birds: null, wind: null };

  // --- 初始化音频系统 (关键：必须由用户点击触发) ---
  function initAudioContext() {
    if (audioCtx) return;
    var AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();

    // 批量初始化音轨
    for (var key in AUDIO_SOURCES) {
        var audio = new Audio(AUDIO_SOURCES[key]);
        audio.crossOrigin = "anonymous";
        audio.loop = true;
        
        var source = audioCtx.createMediaElementSource(audio);
        var gainNode = audioCtx.createGain();
        gainNode.gain.value = 0; // 初始静音

        source.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        tracks[key] = { el: audio, gain: gainNode };
    }
  }

  // --- 音量控制 (解决 iOS 不支持 .volume 的问题) ---
  function updateVolumes() {
    if (!audioCtx || !gameStarted) return;
    if (filteredHeading == null || targetHeading == null) return;

    var diff = Math.abs(shortestAngleDiff(filteredHeading, targetHeading));
    if (isNaN(diff)) return;
    
    // 1. River: 180° = 0, 0° = 1
    var vRiver = Math.pow(Math.max(0, 1 - diff / 180), 1.5);
    setGain(tracks.river.gain, vRiver);

    // 2. Wind: 30°–0° (0° = max, 30° = min)
    var vWind = diff <= 30 ? (1 - diff / 30) : 0;
    setGain(tracks.wind.gain, vWind);

    // 3. Birds: 5°–0° (0° = max, 5° = min，定位最准时)
    var vBirds = diff <= 5 ? (1 - diff / 5) : 0;
    setGain(tracks.birds.gain, vBirds);

    // 更新 UI（仅 ° off，默认不展示由 Show Direction 控制）
    var diffEl = document.getElementById('player-diff');
    diffEl.textContent = Math.round(diff) + '° off';
    if (directionVisible) diffEl.style.display = '';
  }

  function setGain(gainNode, value) {
    // setTargetAtTime 是 iOS 上最顺滑且不会崩溃的音量控制方式
    gainNode.gain.setTargetAtTime(value, audioCtx.currentTime, 0.05);
  }

  // --- 传感器逻辑 ---
  function shortestAngleDiff(from, to) {
    var d = (to - from + 360) % 360;
    return d > 180 ? d - 360 : d;
  }

  function onOrientation(ev) {
    var raw = ev.webkitCompassHeading || (360 - (ev.alpha || 0));
    if (filteredHeading === null) filteredHeading = raw;
    else {
      var d = shortestAngleDiff(filteredHeading, raw);
      filteredHeading = (filteredHeading + d * EMA_ALPHA + 360) % 360;
    }

    if (document.getElementById('page-setup').classList.contains('active')) {
      document.getElementById('setup-heading').textContent = Math.round(filteredHeading) + '°';
    }
    if (gameStarted) updateVolumes();
  }

  // --- 按钮事件 ---
  document.getElementById('btn-enable-sensors').addEventListener('click', function() {
    initAudioContext(); // 用户点击瞬间解锁 Web Audio
    
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(function(res) {
        if (res === 'granted') window.addEventListener('deviceorientation', onOrientation);
      });
    } else {
      window.addEventListener('deviceorientation', onOrientation);
    }
    
    this.style.display = 'none';
    document.getElementById('btn-lock').style.display = 'inline-flex';
    document.getElementById('btn-next').style.display = 'inline-flex';
    document.getElementById('setup-status').textContent = 'Sensors active. Rotate and lock.';
  });

  document.getElementById('btn-lock').addEventListener('click', function() {
    targetHeading = Math.round(filteredHeading);
    document.getElementById('setup-status').textContent = 'Target Locked: ' + targetHeading + '°';
  });

  document.getElementById('btn-next').addEventListener('click', function() {
    document.getElementById('page-setup').classList.remove('active');
    document.getElementById('page-player').classList.add('active');
  });

  function doStartGame() {
    if (!audioCtx || targetHeading == null) return;
    gameStarted = true;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    for (var key in tracks) { tracks[key].el.play(); }
    updateVolumes();
  }

  function doEndGame() {
    gameStarted = false;
    for (var key in tracks) {
      tracks[key].el.pause();
      tracks[key].el.currentTime = 0;
      setGain(tracks[key].gain, 0);
    }
  }

  function onLongPress() {
    longPressTimer = null;
    if (navigator.vibrate) navigator.vibrate(VIBRATE_MS);
    if (gameStarted) doEndGame(); else doStartGame();
  }

  function clearLongPressTimer() {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  }

  var playerEl = document.getElementById('page-player');
  function startLongPressTimer(ev) {
    if (!playerEl.classList.contains('active')) return;
    if (ev.target.closest('button') || ev.target.closest('input')) return;
    ev.preventDefault();
    clearLongPressTimer();
    longPressTimer = setTimeout(onLongPress, LONG_PRESS_MS);
  }
  playerEl.addEventListener('touchstart', startLongPressTimer, { passive: false });
  playerEl.addEventListener('mousedown', startLongPressTimer);
  playerEl.addEventListener('touchend', clearLongPressTimer);
  playerEl.addEventListener('mouseup', clearLongPressTimer);
  playerEl.addEventListener('mouseleave', clearLongPressTimer);
  playerEl.addEventListener('touchcancel', clearLongPressTimer);
  playerEl.addEventListener('contextmenu', function(ev) { ev.preventDefault(); });

  document.getElementById('btn-show-direction').addEventListener('click', function() {
    directionVisible = !directionVisible;
    document.getElementById('player-diff').style.display = directionVisible ? '' : 'none';
    this.textContent = directionVisible ? 'Hide Direction' : 'Show Direction';
  });

  document.getElementById('btn-restart').addEventListener('click', function() {
    window.location.reload();
  });

})();
</script>
</body>
</html>
