<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Find Me — GPS Distance Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: #fff;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      overflow-x: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .page {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 420px;
      min-height: 60vh;
      text-align: center;
    }
    .page.active { display: flex; }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      color: #111;
    }
    .sub {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      min-width: 200px;
      padding: 1rem 2rem;
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
      background: #111;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
      user-select: none;
      transition: transform 0.1s ease, opacity 0.2s ease;
    }
    .btn:active { transform: scale(0.98); opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      margin-top: 1rem;
      background: #333;
      font-size: 1rem;
    }
    .distance {
      font-size: 2.5rem;
      font-weight: 700;
      margin: 1rem 0;
      color: #111;
      letter-spacing: -0.02em;
    }
    .distance.searching {
      font-size: 1.5rem;
      font-weight: 500;
      color: #666;
    }
    .found {
      font-size: 1.75rem;
      font-weight: 700;
      color: #0a0;
      margin: 1rem 0;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: 0.8; } }
    .status {
      font-size: 0.85rem;
      color: #666;
      margin-top: 0.5rem;
    }
    .error { color: #c00; }
  </style>
</head>
<body>
  <!-- Page 1: Setup -->
  <section id="page-setup" class="page active">
    <h1>Find Me</h1>
    <p class="sub">Set your target location, then walk to find it.</p>
    <button id="btn-allow-location" class="btn" type="button">Allow location</button>
    <button id="btn-set-target" class="btn" type="button" style="display:none;">Set Target</button>
    <p id="setup-status" class="status">Tap "Allow location" to enable GPS for this game.</p>
  </section>

  <!-- Page 2: Game -->
  <section id="page-game" class="page">
    <h1>Find the spot</h1>
    <div id="game-display" class="game-display" style="display:none;">
      <p id="game-distance" class="distance"></p>
      <p id="game-found" class="found" style="display:none;">Found it!</p>
    </div>
    <p id="game-status" class="status">Tap Start to begin</p>
    <button id="btn-start" class="btn" type="button">Start</button>
    <button id="btn-end" class="btn btn-secondary" type="button">End</button>
  </section>

  <script>
(function () {
  'use strict';

  // ——— Constants ———
  var AUDIO_RIVER = 'https://raw.githubusercontent.com/remvze/moodist/main/public/sounds/nature/river.mp3';
  var AUDIO_BIRDS = 'https://raw.githubusercontent.com/remvze/moodist/main/public/sounds/animals/birds.mp3';
  var EMA_ALPHA = 0.85;  // Higher = faster response to movement (0.75 balances smoothness vs lag)
  var MAX_VOLUME_M = 1.5;   // Distance at which volume is max (1); min volume at startDistanceM
  var FOUND_ENTER_M = 1.2;  // Hysteresis: show "Found it!" when below this
  var FOUND_LEAVE_M = 1.8;  // Hysteresis: hide "Found it!" when above this

  // ——— State ———
  var target = null;       // { lat, lon }
  var watchId = null;
  var filteredLat = null;
  var filteredLon = null;
  var audioRiver = null;
  var audioBirds = null;
  var gameStarted = false;
  var audioUnlocked = false;
  var foundActive = false;
  var startDistanceM = null;  // Distance when user clicked Start → min volume (0); max volume at 1.5m

  // ——— DOM ———
  var pageSetup = document.getElementById('page-setup');
  var pageGame = document.getElementById('page-game');
  var btnAllowLocation = document.getElementById('btn-allow-location');
  var btnSetTarget = document.getElementById('btn-set-target');
  var btnStart = document.getElementById('btn-start');
  var btnEnd = document.getElementById('btn-end');
  var setupStatus = document.getElementById('setup-status');
  var gameDisplay = document.getElementById('game-display');
  var gameDistance = document.getElementById('game-distance');
  var gameFound = document.getElementById('game-found');
  var gameStatus = document.getElementById('game-status');

  // ——— EMA filter ———
  function filterNext(prev, next, alpha) {
    if (prev == null) return next;
    return prev + alpha * (next - prev);
  }

  function updateFilter(lat, lon) {
    filteredLat = filterNext(filteredLat, lat, EMA_ALPHA);
    filteredLon = filterNext(filteredLon, lon, EMA_ALPHA);
    return { lat: filteredLat, lon: filteredLon };
  }

  // ——— Haversine (meters) ———
  function haversineMeters(lat1, lon1, lat2, lon2) {
    var R = 6371000;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  // ——— Audio ———
  function createAudio(url) {
    var a = new Audio(url);
    a.preload = 'auto';
    a.loop = true;
    return a;
  }

  function ensureAudio() {
    if (!audioRiver) audioRiver = createAudio(AUDIO_RIVER);
    if (!audioBirds) audioBirds = createAudio(AUDIO_BIRDS);
  }

  function unlockAndStartRiver() {
    ensureAudio();
    if (audioUnlocked && gameStarted) {
      audioRiver.currentTime = 0;
      audioRiver.play().catch(function () {});
    }
  }

  function setRiverVolume(vol) {
    if (audioRiver) audioRiver.volume = Math.max(0, Math.min(1, vol));
  }

  function setBirdsVolume(vol) {
    if (audioBirds) audioBirds.volume = Math.max(0, Math.min(1, vol));
  }

  function stopAllAudio() {
    if (audioRiver) { audioRiver.pause(); audioRiver.currentTime = 0; }
    if (audioBirds) { audioBirds.pause(); audioBirds.currentTime = 0; }
  }

  // ——— Volume from distance (min vol at startDistanceM, max vol at 1.5m) ———
  function volumeFromDistance(distanceM) {
    if (startDistanceM == null) return 0;
    if (distanceM <= MAX_VOLUME_M) return 1;
    if (startDistanceM <= MAX_VOLUME_M) return 1;
    if (distanceM >= startDistanceM) return 0;
    return 1 - (distanceM - MAX_VOLUME_M) / (startDistanceM - MAX_VOLUME_M);
  }

  function birdsVolumeFromDistance(distanceM) {
    if (distanceM >= MAX_VOLUME_M) return 0;
    return 1 - distanceM / MAX_VOLUME_M;
  }

  // ——— UI ———
  function showPage(pageEl) {
    pageSetup.classList.remove('active');
    pageGame.classList.remove('active');
    pageEl.classList.add('active');
  }

  function setSetupStatus(msg, isError) {
    setupStatus.textContent = msg || '';
    setupStatus.className = 'status' + (isError ? ' error' : '');
  }

  function setGameStatus(msg) {
    gameStatus.textContent = msg || '';
  }

  function updateGameUI(distanceM) {
    if (!gameStarted) return;
    gameDisplay.style.display = '';
    if (distanceM == null || distanceM < 0.1) {
      gameDistance.textContent = 'Searching...';
      gameDistance.classList.add('searching');
      gameFound.style.display = 'none';
      setRiverVolume(0);
      setBirdsVolume(0);
      if (audioBirds) audioBirds.pause();
      return;
    }
    gameDistance.classList.remove('searching');
    gameDistance.textContent = (distanceM < 1 ? distanceM.toFixed(1) : Math.round(distanceM)) + ' m';
    if (distanceM <= FOUND_ENTER_M) foundActive = true;
    if (distanceM >= FOUND_LEAVE_M) foundActive = false;
    if (foundActive) {
      gameFound.style.display = 'block';
      setRiverVolume(1);
      setBirdsVolume(birdsVolumeFromDistance(distanceM));
      if (audioUnlocked && audioBirds.paused) {
        audioBirds.currentTime = 0;
        audioBirds.play().catch(function () {});
      }
    } else {
      gameFound.style.display = 'none';
      setRiverVolume(volumeFromDistance(distanceM));
      setBirdsVolume(0);
      if (audioBirds) audioBirds.pause();
    }
  }

  // ——— Geolocation ———
  function onPosition(pos) {
    var lat = pos.coords.latitude;
    var lon = pos.coords.longitude;
    var filtered = updateFilter(lat, lon);
    if (target) {
      if (gameStarted) {
        var d = haversineMeters(filtered.lat, filtered.lon, target.lat, target.lon);
        updateGameUI(d);
      }
    } else {
      setSetupStatus('Ready. Tap "Set Target" to save this spot.');
      btnAllowLocation.style.display = 'none';
      btnSetTarget.style.display = 'inline-flex';
    }
  }

  function onError(err) {
    var msg = 'Location error: ' + (err.message || 'unknown');
    if (err.code === 1) {
      msg = 'Location denied. Tap "Allow location" to try again, or allow in browser settings.';
      if (watchId != null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      btnAllowLocation.style.display = 'inline-flex';
      btnSetTarget.style.display = 'none';
    }
    if (target) setGameStatus(msg); else setSetupStatus(msg, true);
  }

  function startWatching() {
    if (watchId != null) return;
    filteredLat = null;
    filteredLon = null;
    watchId = navigator.geolocation.watchPosition(onPosition, onError, {
      enableHighAccuracy: true,
      maximumAge: 1500,  // Allow ~1.5s cache so first update returns quickly; still get fresh fixes
      timeout: 8000
    });
  }

  function stopWatching() {
    if (watchId != null) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
    }
  }

  // ——— Actions ———
  function onSetTarget() {
    if (filteredLat == null || filteredLon == null) {
      setSetupStatus('Getting position…', true);
      return;
    }
    target = { lat: filteredLat, lon: filteredLon };
    setSetupStatus('Target set!');
    gameDisplay.style.display = 'none';
    gameFound.style.display = 'none';
    foundActive = false;
    showPage(pageGame);
  }

  function onStart() {
    ensureAudio();
    audioUnlocked = true;
    gameStarted = true;
    foundActive = false;
    setRiverVolume(0);
    setBirdsVolume(0);
    gameDisplay.style.display = '';
    gameDistance.textContent = 'Searching...';
    gameDistance.classList.add('searching');
    gameFound.style.display = 'none';
    if (target && filteredLat != null && filteredLon != null) {
      startDistanceM = haversineMeters(filteredLat, filteredLon, target.lat, target.lon);
    } else {
      startDistanceM = null;
    }
    unlockAndStartRiver();
    setGameStatus('Walking…');
    btnStart.disabled = true;
    if (target && filteredLat != null && filteredLon != null) {
      var d = haversineMeters(filteredLat, filteredLon, target.lat, target.lon);
      updateGameUI(d);
    }
  }

  function onEnd() {
    gameStarted = false;
    audioUnlocked = false;
    foundActive = false;
    startDistanceM = null;
    stopAllAudio();
    stopWatching();
    target = null;
    filteredLat = null;
    filteredLon = null;
    btnStart.disabled = false;
    gameDisplay.style.display = 'none';
    gameFound.style.display = 'none';
    setGameStatus('Tap Start to begin');
    showPage(pageSetup);
    setSetupStatus('Tap "Allow location" to enable GPS for this game.');
    btnAllowLocation.style.display = 'inline-flex';
    btnSetTarget.style.display = 'none';
  }

  function onAllowLocation() {
    btnAllowLocation.style.display = 'none';
    setSetupStatus('Getting position…');
    startWatching();
  }

  // ——— Init ———
  btnAllowLocation.addEventListener('click', function () {
    onAllowLocation();
  }, { passive: true });

  btnSetTarget.addEventListener('click', function () {
    onSetTarget();
  }, { passive: true });

  btnStart.addEventListener('click', function () {
    onStart();
  }, { passive: true });

  btnEnd.addEventListener('click', function () {
    onEnd();
  }, { passive: true });

  ensureAudio();
})();
  </script>
</body>
</html>
